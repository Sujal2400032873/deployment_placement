spring.application.name=PlacementPro_Backend

# MySQL configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/placementpro?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

# Production readiness
spring.profiles.active=prod

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=20000
spring.datasource.hikari.pool-name=PlacementProHikariCP

# Server port
server.port=8080

# Error message visibility (overridden by profile-specific config)
server.error.include-message=always
server.error.include-binding-errors=always

# Logging (profile-specific levels are configured in application-dev.properties and application-prod.properties)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger - %msg%n

# Performance and caching
spring.cache.type=caffeine

# JWT Configuration
app.jwt.secret=${JWT_SECRET:placementpro-dev-secret-change-me-at-least-32-bytes-long-2026}
app.jwt.expiration-ms=86400000

# Email Configuration (SMTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

# Rate Limiting Configuration
# Global API rate limiting: 100 requests per minute per IP
rate-limit.global-api.limit=100
rate-limit.global-api.duration=1m

# Sensitive endpoint rate limiting: 20 requests per minute per IP
rate-limit.sensitive-endpoint.limit=20
rate-limit.sensitive-endpoint.duration=1m

# Cache expiration for rate limit buckets (in minutes)
rate-limit.cache-expiration-minutes=30
